<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reach for the Stars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #0a0a2a 0%, #1a1a4a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            color: #fff;
            font-size: 1rem;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
        }

        .hud-item {
            display: flex;
            gap: 8px;
        }

        .altitude {
            color: #00ff88;
            font-weight: bold;
        }

        .money {
            color: #ffd700;
            font-weight: bold;
        }

        #gameCanvas {
            border: 3px solid #333;
            border-radius: 8px;
            background: linear-gradient(180deg, #87CEEB 0%, #1a1a4a 100%);
        }

        .controls {
            color: #888;
            font-size: 0.85rem;
            text-align: center;
        }

        .shop-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 16px;
            display: none;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            max-height: 80vh;
            overflow-y: auto;
        }

        .shop-overlay h2 {
            color: #ffd700;
            text-align: center;
        }

        .shop-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            min-width: 300px;
        }

        .shop-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .shop-item.owned {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
        }

        .shop-item.equipped {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
        }

        .buy-btn {
            padding: 6px 12px;
            background: #ffd700;
            border: none;
            border-radius: 4px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        .buy-btn:disabled {
            background: #666;
            color: #999;
            cursor: not-allowed;
        }

        .close-btn {
            padding: 10px 20px;
            background: #00ff88;
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .inventory {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
        }

        .inv-slot {
            width: 50px;
            height: 50px;
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .inv-slot .count {
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 10px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 1px 4px;
            border-radius: 3px;
        }

        .back-link {
            color: #00ff88;
            text-decoration: none;
            position: absolute;
            top: 10px;
            left: 10px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Arcade</a>

    <div class="game-container">
        <div class="hud">
            <div class="hud-item">
                <span>Altitude:</span>
                <span class="altitude" id="altitude">0</span>
                <span>m</span>
            </div>
            <div class="hud-item">
                <span>Best:</span>
                <span class="altitude" id="bestAltitude">0</span>
                <span>m</span>
            </div>
            <div class="hud-item money">
                <span>$</span><span id="money">500</span>
            </div>
            <button id="shopBtn" style="padding: 5px 10px; background: #ffd700; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">SHOP [S]</button>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div class="inventory">
            <div class="inv-slot" id="slot-rocket" title="Rockets">🚀<span class="count" id="count-rocket">0</span></div>
            <div class="inv-slot" id="slot-jetpack" title="Jetpacks">🎒<span class="count" id="count-jetpack">0</span></div>
            <div class="inv-slot" id="slot-boost" title="Boosters">💥<span class="count" id="count-boost">0</span></div>
            <div class="inv-slot" id="slot-shield" title="Shields">🛡️<span class="count" id="count-shield">0</span></div>
            <div class="inv-slot" id="slot-fuel" title="Fuel">⛽<span class="count" id="count-fuel">0</span></div>
            <div class="inv-slot" id="slot-parachute" title="Parachutes">🪂<span class="count" id="count-parachute">0</span></div>
        </div>

        <div class="controls">
            <strong>SPACE</strong> to launch/boost | <strong>Q W E T Y U</strong> use items | <strong>S</strong> shop | <strong>R</strong> restart
        </div>

        <div class="shop-overlay" id="shopOverlay">
            <h2>🚀 SPACE SHOP 🚀</h2>
            <div class="shop-items" id="shopItems"></div>
            <button class="close-btn" id="closeShopBtn">Close</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const altitudeElement = document.getElementById('altitude');
        const bestAltitudeElement = document.getElementById('bestAltitude');
        const moneyElement = document.getElementById('money');
        const shopOverlay = document.getElementById('shopOverlay');
        const shopItems = document.getElementById('shopItems');

        const GRAVITY = 0.12;
        const LAUNCH_POWER = 12;

        let player = { x: 400, y: 550, vx: 0, vy: 0, width: 30, height: 40 };
        let launched = false;
        let altitude = 0;
        let bestAltitude = parseInt(localStorage.getItem('reachBestAltitude')) || 0;
        let totalMoney = parseInt(localStorage.getItem('reachTotalMoney')) || 500;
        let money = totalMoney;
        let launchPower = 0;
        let charging = false;
        let isGameOver = false;
        let isPaused = false;

        let inventory = {
            rocket: 3,
            jetpack: 1,
            boost: 2,
            shield: 0,
            fuel: 2,
            parachute: 0
        };

        let activeEffects = {
            shield: false,
            jetpack: false,
            parachute: false
        };

        let clouds = [];
        let stars = [];
        let particles = [];

        const SHOP_ITEMS = [
            { id: 'rocket', name: '🚀 Rocket', desc: 'Gives extra boost in flight', price: 100, count: 1 },
            { id: 'jetpack', name: '🎒 Jetpack', desc: 'Continuous thrust while active', price: 300, count: 1 },
            { id: 'boost', name: '💥 Booster', desc: 'Big burst of speed', price: 150, count: 1 },
            { id: 'shield', name: '🛡️ Shield', desc: 'Protects from crash', price: 200, count: 1 },
            { id: 'fuel', name: '⛽ Fuel Tank', desc: 'Refuels jetpack', price: 80, count: 1 },
            { id: 'parachute', name: '🪂 Parachute', desc: 'Slows descent', price: 120, count: 1 },
            { id: 'launcher', name: '🔧 Rocket Launcher', desc: 'Better initial launch', price: 500, owned: false },
            { id: 'tank', name: '🛢️ Fuel Tank', desc: 'Bigger fuel capacity', price: 400, owned: false },
            { id: 'booster', name: '⚡ Turbo Charger', desc: 'Faster jetpack', price: 600, owned: false }
        ];

        let ownedItems = {
            launcher: false,
            tank: false,
            booster: false
        };

        let fuelCapacity = 100;
        let jetpackPower = 0.3;
        let launchMultiplier = 1;

        function init() {
            player = { x: 400, y: 550, vx: 0, vy: 0, width: 30, height: 40 };
            launched = false;
            altitude = 0;
            launchPower = 0;
            charging = false;
            isGameOver = false;
            isPaused = false;

            activeEffects = {
                shield: false,
                jetpack: false,
                parachute: false
            };

            bestAltitudeElement.textContent = bestAltitude;
            moneyElement.textContent = money;

            createClouds();
            createStars();
            updateInventoryUI();
        }

        function createClouds() {
            clouds = [];
            for (let i = 0; i < 15; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    width: 50 + Math.random() * 100,
                    height: 20 + Math.random() * 30,
                    speed: 0.2 + Math.random() * 0.5
                });
            }
        }

        function createStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: 1 + Math.random() * 2,
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }

        function updateInventoryUI() {
            document.getElementById('count-rocket').textContent = inventory.rocket;
            document.getElementById('count-jetpack').textContent = inventory.jetpack;
            document.getElementById('count-boost').textContent = inventory.boost;
            document.getElementById('count-shield').textContent = inventory.shield;
            document.getElementById('count-fuel').textContent = inventory.fuel;
            document.getElementById('count-parachute').textContent = inventory.parachute;
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);

            if (altitude > 5000) {
                gradient.addColorStop(0, '#000010');
                gradient.addColorStop(0.5, '#0a0a20');
                gradient.addColorStop(1, '#1a1a3a');
            } else if (altitude > 2000) {
                gradient.addColorStop(0, '#000030');
                gradient.addColorStop(0.5, '#0a0a50');
                gradient.addColorStop(1, '#2a2a6a');
            } else if (altitude > 500) {
                gradient.addColorStop(0, '#1a1a4a');
                gradient.addColorStop(0.5, '#3a5a8a');
                gradient.addColorStop(1, '#6a9aca');
            } else {
                gradient.addColorStop(0, '#87CEEB');
                gradient.addColorStop(0.5, '#4a90a4');
                gradient.addColorStop(1, '#2d5a3d');
            }

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (altitude < 1000) {
                ctx.fillStyle = '#2d5a3d';
                ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

                ctx.fillStyle = '#8B4513';
                ctx.fillRect(350, canvas.height - 70, 100, 30);
                ctx.fillRect(370, canvas.height - 90, 60, 25);
            }
        }

        function drawStars() {
            if (altitude < 500) return;

            const starAlpha = Math.min(1, (altitude - 500) / 1000);
            stars.forEach(star => {
                const twinkle = Math.sin(star.twinkle + Date.now() / 500) * 0.5 + 0.5;
                ctx.fillStyle = `rgba(255, 255, 255, ${starAlpha * twinkle})`;
                ctx.beginPath();
                ctx.arc(star.x, (star.y + altitude * 0.1) % canvas.height, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawClouds() {
            if (altitude > 2000) return;

            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            clouds.forEach(cloud => {
                const y = (cloud.y - altitude * 0.05 + canvas.height) % canvas.height;
                ctx.beginPath();
                ctx.ellipse(cloud.x, y, cloud.width / 2, cloud.height / 2, 0, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);

            if (activeEffects.jetpack) {
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.moveTo(-8, player.height / 2);
                ctx.lineTo(-15, player.height / 2 + 20 + Math.random() * 10);
                ctx.lineTo(-5, player.height / 2 + 15);
                ctx.closePath();
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(8, player.height / 2);
                ctx.lineTo(15, player.height / 2 + 20 + Math.random() * 10);
                ctx.lineTo(5, player.height / 2 + 15);
                ctx.closePath();
                ctx.fill();
            }

            ctx.fillStyle = '#ffcc00';
            ctx.beginPath();
            ctx.arc(0, 0, player.width / 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ff9900';
            ctx.beginPath();
            ctx.arc(0, 5, player.width / 4, Math.PI, 0);
            ctx.fill();

            ctx.fillStyle = '#333';
            ctx.fillRect(-15, -10, 30, 25);
            ctx.fillStyle = '#555';
            ctx.fillRect(-12, -7, 24, 19);

            if (activeEffects.shield) {
                ctx.strokeStyle = 'rgba(100, 100, 255, 0.7)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, player.width + 5, 0, Math.PI * 2);
                ctx.stroke();
            }

            if (activeEffects.parachute) {
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(0, -player.height - 30, 35, Math.PI, 0);
                ctx.fill();

                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, -player.height - 5);
                ctx.lineTo(-30, -player.height - 25);
                ctx.moveTo(0, -player.height - 5);
                ctx.lineTo(30, -player.height - 25);
                ctx.moveTo(0, -player.height - 5);
                ctx.lineTo(-15, -player.height - 55);
                ctx.moveTo(0, -player.height - 5);
                ctx.lineTo(15, -player.height - 55);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawLaunchBar() {
            if (launched || !charging) return;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(300, canvas.height - 80, 200, 30);

            const powerColor = launchPower < 30 ? '#ff4444' : launchPower < 70 ? '#ffaa00' : '#00ff88';
            ctx.fillStyle = powerColor;
            ctx.fillRect(300, canvas.height - 80, launchPower * 2, 30);

            ctx.strokeStyle = '#fff';
            ctx.strokeRect(300, canvas.height - 80, 200, 30);

            ctx.fillStyle = '#fff';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`Power: ${Math.floor(launchPower)}%`, 400, canvas.height - 58);
        }

        function draw() {
            drawBackground();
            drawStars();
            drawClouds();
            drawParticles();
            drawPlayer();
            drawLaunchBar();

            if (!launched && !charging) {
                ctx.fillStyle = '#fff';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Hold SPACE to charge launch!', canvas.width / 2, canvas.height - 100);
                ctx.font = '12px Arial';
                ctx.fillText('Use items [Q W E R T Y] before launching!', canvas.width / 2, canvas.height - 75);
            }

            if (isGameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#ff4444';
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('CRASH!', canvas.width / 2, canvas.height / 2 - 50);

                ctx.fillStyle = '#fff';
                ctx.font = '24px Arial';
                ctx.fillText(`Altitude: ${altitude}m`, canvas.width / 2, canvas.height / 2);
                ctx.fillText(`Money Earned: $${money - totalMoney}`, canvas.width / 2, canvas.height / 2 + 30);

                ctx.fillStyle = '#00ff88';
                ctx.font = '18px Arial';
                ctx.fillText('Press R to restart', canvas.width / 2, canvas.height / 2 + 80);
            }
        }

        function update() {
            if (isPaused || isGameOver) return;

            if (!launched) {
                if (charging) {
                    launchPower = Math.min(100, launchPower + 1.5);
                }
                return;
            }

            let gravity = GRAVITY;

            if (activeEffects.parachute) {
                gravity *= 0.3;
            }

            if (activeEffects.jetpack && inventory.fuel > 0) {
                player.vy -= jetpackPower;
                inventory.fuel -= 0.3;
                if (inventory.fuel <= 0) {
                    inventory.fuel = 0;
                    activeEffects.jetpack = false;
                }
                spawnParticles(player.x, player.y + player.height / 2, '#ff6600', 3);
                updateInventoryUI();
            }

            player.vy += gravity;

            player.x += player.vx;
            player.y += player.vy;

            player.vx *= 0.99;

            if (player.x < 0) player.x = canvas.width;
            if (player.x > canvas.width) player.x = 0;

            altitude = Math.max(0, Math.floor((550 - player.y) * 2));
            altitudeElement.textContent = altitude;

            clouds.forEach(cloud => {
                cloud.y += cloud.speed;
                if (cloud.y > canvas.height) cloud.y = 0;
            });

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                p.size *= 0.98;
            });
            particles = particles.filter(p => p.life > 0);

            if (player.y > 600) {
                if (altitude > bestAltitude) {
                    bestAltitude = altitude;
                    localStorage.setItem('reachBestAltitude', bestAltitude);
                    bestAltitudeElement.textContent = bestAltitude;
                }

                if (!activeEffects.shield) {
                    isGameOver = true;
                    saveMoney();
                } else {
                    player.y = 550;
                    player.vy = 0;
                    player.vx = 0;
                    activeEffects.shield = false;
                }
            }

            if (player.y < -100) {
                player.vy = Math.max(player.vy, 0);
            }
        }

        function spawnParticles(x, y, color, vy) {
            for (let i = 0; i < 3; i++) {
                const c = hexToRgb(color);
                particles.push({
                    x: x + (Math.random() - 0.5) * 10,
                    y: y,
                    vx: (Math.random() - 0.5) * 2,
                    vy: vy + Math.random() * 2,
                    size: 3 + Math.random() * 3,
                    r: c.r,
                    g: c.g,
                    b: c.b,
                    life: 1
                });
            }
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 255, g: 255, b: 255 };
        }

        function useItem(itemId) {
            if (!launched) {
                switch (itemId) {
                    case 'rocket':
                        if (inventory.rocket > 0) {
                            inventory.rocket--;
                            launchPower = Math.min(100, launchPower + 25);
                            updateInventoryUI();
                            playSound('powerup');
                        }
                        break;
                    case 'jetpack':
                        if (inventory.jetpack > 0) {
                            inventory.jetpack--;
                            inventory.fuel = Math.min(fuelCapacity, inventory.fuel + 50);
                            updateInventoryUI();
                            playSound('powerup');
                        }
                        break;
                    case 'boost':
                        if (inventory.boost > 0) {
                            inventory.boost--;
                            inventory.rocket = Math.min(99, inventory.rocket + 2);
                            updateInventoryUI();
                            playSound('powerup');
                        }
                        break;
                    case 'shield':
                        if (inventory.shield > 0) {
                            inventory.shield--;
                            activeEffects.shield = true;
                            updateInventoryUI();
                            playSound('powerup');
                        }
                        break;
                    case 'fuel':
                        if (inventory.fuel > 0) {
                            inventory.fuel = Math.min(fuelCapacity, inventory.fuel + 30);
                            updateInventoryUI();
                            playSound('powerup');
                        }
                        break;
                    case 'parachute':
                        if (inventory.parachute > 0) {
                            inventory.parachute--;
                            activeEffects.parachute = true;
                            updateInventoryUI();
                            playSound('powerup');
                        }
                        break;
                }
            } else {
                if (itemId === 'rocket' && inventory.rocket > 0) {
                    inventory.rocket--;
                    player.vy -= 8;
                    spawnParticles(player.x, player.y + player.height / 2, '#ff6600', 5);
                    updateInventoryUI();
                    playSound('boost');
                }
                if (itemId === 'jetpack' && !activeEffects.jetpack && inventory.jetpack > 0) {
                    activeEffects.jetpack = true;
                    playSound('powerup');
                }
                if (itemId === 'boost' && inventory.boost > 0) {
                    inventory.boost--;
                    player.vy -= 12;
                    spawnParticles(player.x, player.y + player.height / 2, '#ff00ff', 8);
                    updateInventoryUI();
                    playSound('boost');
                }
                if (itemId === 'shield' && !activeEffects.shield && inventory.shield > 0) {
                    inventory.shield--;
                    activeEffects.shield = true;
                    updateInventoryUI();
                    playSound('powerup');
                }
                if (itemId === 'fuel' && inventory.fuel < fuelCapacity) {
                    inventory.fuel = Math.min(fuelCapacity, inventory.fuel + 50);
                    updateInventoryUI();
                    playSound('powerup');
                }
                if (itemId === 'parachute' && !activeEffects.parachute && inventory.parachute > 0) {
                    inventory.parachute--;
                    activeEffects.parachute = true;
                    updateInventoryUI();
                    playSound('powerup');
                }
            }
        }

        function openShop() {
            isPaused = true;
            renderShop();
            shopOverlay.style.display = 'flex';
        }

        function closeShop() {
            isPaused = false;
            shopOverlay.style.display = 'none';
        }

        function renderShop() {
            shopItems.innerHTML = '';

            const consumables = SHOP_ITEMS.filter(item => !item.hasOwnProperty('owned'));
            const upgrades = SHOP_ITEMS.filter(item => item.hasOwnProperty('owned'));

            consumables.forEach(item => {
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.innerHTML = `
                    <div>
                        <strong>${item.name}</strong>
                        <div style="color: #888; font-size: 0.85rem;">${item.desc}</div>
                    </div>
                    <button class="buy-btn" data-id="${item.id}" data-price="${item.price}">$${item.price}</button>
                `;
                shopItems.appendChild(div);
            });

            upgrades.forEach(item => {
                const div = document.createElement('div');
                div.className = 'shop-item' + (ownedItems[item.id] ? ' owned' : '');
                div.innerHTML = `
                    <div>
                        <strong>${item.name}</strong>
                        <div style="color: #888; font-size: 0.85rem;">${item.desc}</div>
                    </div>
                    ${ownedItems[item.id] ? '<span style="color: #00ff88;">OWNED</span>' :
                        `<button class="buy-btn" data-id="${item.id}" data-price="${item.price}">$${item.price}</button>`}
                `;
                shopItems.appendChild(div);
            });

            shopItems.querySelectorAll('.buy-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const price = parseInt(btn.dataset.price);
                    if (money >= price) {
                        money -= price;
                        moneyElement.textContent = money;

                        const item = SHOP_ITEMS.find(i => i.id === btn.dataset.id);
                        if (item) {
                            if (item.hasOwnProperty('owned')) {
                                ownedItems[item.id] = true;
                                if (item.id === 'launcher') launchMultiplier = 1.5;
                                if (item.id === 'tank') fuelCapacity = 200;
                                if (item.id === 'booster') jetpackPower = 0.5;
                            } else {
                                inventory[item.id] = (inventory[item.id] || 0) + item.count;
                            }
                            updateInventoryUI();
                            playSound('purchase');
                        }
                        renderShop();
                    }
                });
            });
        }

        function saveMoney() {
            totalMoney = money;
            localStorage.setItem('reachTotalMoney', totalMoney);
        }

        function playSound(type) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                const now = audioCtx.currentTime;

                switch(type) {
                    case 'launch':
                        oscillator.type = 'sawtooth';
                        oscillator.frequency.setValueAtTime(80, now);
                        oscillator.frequency.exponentialRampToValueAtTime(300, now + 0.8);
                        gainNode.gain.setValueAtTime(0.3, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                        oscillator.start(now);
                        oscillator.stop(now + 0.8);
                        break;
                    case 'boost':
                        oscillator.type = 'square';
                        oscillator.frequency.setValueAtTime(200, now);
                        oscillator.frequency.exponentialRampToValueAtTime(500, now + 0.2);
                        gainNode.gain.setValueAtTime(0.2, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                        oscillator.start(now);
                        oscillator.stop(now + 0.2);
                        break;
                    case 'powerup':
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(500, now);
                        oscillator.frequency.setValueAtTime(800, now + 0.1);
                        gainNode.gain.setValueAtTime(0.15, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                        oscillator.start(now);
                        oscillator.stop(now + 0.15);
                        break;
                    case 'purchase':
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(400, now);
                        oscillator.frequency.setValueAtTime(600, now + 0.05);
                        oscillator.frequency.setValueAtTime(800, now + 0.1);
                        gainNode.gain.setValueAtTime(0.15, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                        oscillator.start(now);
                        oscillator.stop(now + 0.2);
                        break;
                }
            } catch (e) {}
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!launched && !isPaused) {
                    charging = true;
                }
            }
            if (e.code === 'KeyS' && !isGameOver) {
                if (isPaused) {
                    closeShop();
                } else {
                    openShop();
                }
            }
            if (e.code === 'KeyR' && !launched) {
                saveMoney();
                init();
            }
            if (e.code === 'KeyQ') useItem('rocket');
            if (e.code === 'KeyW') useItem('jetpack');
            if (e.code === 'KeyE') useItem('boost');
            if (e.code === 'KeyT') useItem('shield');
            if (e.code === 'KeyY') useItem('fuel');
            if (e.code === 'KeyU') useItem('parachute');
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && charging && !launched && !isPaused) {
                launched = true;
                charging = false;
                player.vy = -LAUNCH_POWER * (launchPower / 100) * launchMultiplier - 5;
                launchPower = 0;
                playSound('launch');
            }
        });

        document.getElementById('shopBtn').addEventListener('click', openShop);
        document.getElementById('closeShopBtn').addEventListener('click', closeShop);

        function gameLoopFn() {
            update();
            draw();
            requestAnimationFrame(gameLoopFn);
        }

        init();
        gameLoopFn();
    </script>
</body>
</html>
